# Defines the five services that make up the finance stack:
# postgres (data store), init-script (one-shot balance rebuild),
# finance-app (Next.js UI), metabase (BI dashboards), and appsmith (internal app builder).

name: finance-stack                    # Ensures consistent container/volume naming regardless of directory

# Shared logging config — keeps logs from filling the disk (30 MB max per service).
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  # Primary PostgreSQL database that stores all financial data.
  postgres:
    image: postgres:18.0
    container_name: postgres
    restart: unless-stopped              # Auto-restart on crash or Docker daemon restart
    environment:                         # All credentials sourced from .env — see .env.example for the template
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}           # Default system DB; the Finances DB is created by the backup restore
      MB_DB_USER: ${MB_DB_USER}             # Passed through so init-db script can create the Metabase role
      MB_DB_PASS: ${MB_DB_PASS}
      MB_DB_DBNAME: ${MB_DB_DBNAME}
    ports:
      - "5433:5432"              # Exposed on 5433 to avoid conflicts with a local Postgres on the default port
    volumes:
      - postgres_data:/var/lib/postgresql  # PG18 moved PGDATA to /var/lib/postgresql/18/docker; mount the parent
      - ./init-db:/docker-entrypoint-initdb.d:ro  # Runs once on first start (empty data dir) to create DBs and roles
    networks:
      - appnet
    logging: *default-logging
    healthcheck:                 # Other services wait on this check before starting
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
    labels:
      com.finance-stack.component: "database"
      com.finance-stack.description: "Primary PostgreSQL database"

  # One-shot job: runs UpdateAccountBalanceHistory.sql after postgres is healthy,
  # then exits. Rebuilds the account_balance_history table with fresh cumulative balances.
  # Behind the "init" profile — only runs when explicitly requested:
  #   docker compose --profile init run --rm init-script
  init-script:
    image: postgres:18.0
    profiles: ["init"]                   # Not started by default; run with --profile init
    restart: "no"                        # One-shot job — must not restart after exiting
    depends_on:
      postgres:
        condition: service_healthy  # Waits for postgres to pass its healthcheck before running
    networks:
      - appnet
    environment:                         # Credentials via env vars; PGHOST/PGUSER/PGDATABASE are native psql vars
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER}
      PGDATABASE: ${INIT_SCRIPT_DB:-Finances}
    volumes:
      - ./scripts:/scripts:ro            # Read-only mount — container should not modify scripts
    entrypoint: >
      bash -c "
      set -euo pipefail;
      echo 'Waiting for $${PGDATABASE} database...';
      until psql -c 'SELECT 1' > /dev/null 2>&1; do
        echo 'Database not ready, retrying in 2s...';
        sleep 2;
      done;
      echo 'Running UpdateAccountBalanceHistory.sql...';
      psql -f /scripts/UpdateAccountBalanceHistory.sql;
      echo 'Done.';
      "
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    labels:
      com.finance-stack.component: "init"
      com.finance-stack.description: "One-shot balance history rebuild"

  # Next.js 16 application — custom finance management UI.
  # Built from the app/ directory using a multi-stage Dockerfile.
  finance-app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: finance-app
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${FINANCE_APP_DB:-Finances}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - appnet
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --spider http://localhost:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M
    labels:
      com.finance-stack.component: "app"
      com.finance-stack.description: "Next.js finance application"

  # Metabase BI tool for dashboards and ad-hoc analytics against the Finances database.
  # Stores its own internal metadata (questions, dashboards, users) in a separate metabase DB.
  metabase:
    image: metabase/metabase:v0.58.8
    container_name: metabase
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${MB_DB_DBNAME}         # Metabase's internal state DB — separate from the Finances DB
      MB_DB_PORT: 5432
      MB_DB_USER: ${MB_DB_USER}
      MB_DB_PASS: ${MB_DB_PASS}
      MB_DB_HOST: postgres
      TZ: ${TZ:-America/Chicago}            # Ensures chart timestamps and date grouping use local time
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      postgres:
        condition: service_healthy  # Waits for postgres healthcheck, not just container start
    networks:
      - appnet
    logging: *default-logging
    healthcheck:                   # Metabase exposes a health API endpoint
      test: ["CMD-SHELL", "curl --fail -I http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s          # Metabase can take 1-2 min on first startup (DB migrations)
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
        reservations:
          memory: 512M
    labels:
      com.finance-stack.component: "bi"
      com.finance-stack.description: "Metabase BI dashboards"

  # Appsmith Community Edition — low-code platform for building internal financial apps.
  appsmith:
    image: appsmith/appsmith-ce:v1.95
    container_name: appsmith
    restart: unless-stopped
    ports:
      - "8080:80"                 # Appsmith's internal server runs on port 80
    volumes:
     - appsmith_data:/appsmith-stacks
    depends_on:
      postgres:
        condition: service_healthy  # Waits for postgres healthcheck, not just container start
    networks:
      - appnet
    logging: *default-logging
    healthcheck:                   # Appsmith ships a built-in healthcheck script
      test: ["CMD-SHELL", "/opt/appsmith/healthcheck.sh"]
      interval: 15s
      timeout: 15s
      retries: 3
      start_period: 120s          # Appsmith can take up to 2 min on first start
    deploy:
      resources:
        limits:
          memory: 3G              # Appsmith idles near 2 GB; 3 GB gives headroom under load
          cpus: "1.0"
        reservations:
          memory: 512M
    labels:
      com.finance-stack.component: "app-builder"
      com.finance-stack.description: "Appsmith low-code platform"

volumes:
  postgres_data:    # Persists PostgreSQL data across container restarts
  metabase_data:    # Persists Metabase dashboards, questions, and settings
  appsmith_data:    # Persists Appsmith app definitions and configuration

networks:
  appnet:
    driver: bridge  # Shared bridge network so services can reach each other by container name
