# Triggered on every vX.Y.Z annotated tag push. Runs the version/tag-consistency gate
# (check:changelog), builds the Docker image with GIT_SHA + BUILD_TIME baked in, asserts
# /api/health reports the correct version + SHA, then publishes a GitHub Release whose
# body is the matching CHANGELOG.md section. The gate runs before any Docker work so a
# mismatched tag (tag ≠ package.json/CHANGELOG) fails fast without burning build time.
# See docs/releases.md and Issue #175.

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write  # required for gh release create

jobs:
  release:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git describe (previous tag) used in the compare link

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Gate: asserts package.json version == newest CHANGELOG release == pushed tag.
      # check-changelog.ts reads GITHUB_REF_TYPE / GITHUB_REF_NAME automatically on
      # tag pushes, so no args are needed. Exit 1 + ::error:: annotation on any drift.
      - name: Version & tag consistency gate
        run: npm run check:changelog

      # Compute stamp variables used by the Docker build and the Release body.
      # GIT_SHA uses the full 40-char SHA so it matches github.sha exactly — the same
      # value that ends up in finance-app:$GIT_SHA and in /api/health .build.gitSha.
      - name: Compute stamp variables
        working-directory: .
        run: |
          VER="${GITHUB_REF_NAME#v}"
          GIT_SHA="${{ github.sha }}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          PREV_TAG="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"

          echo "VER=$VER"             >> "$GITHUB_ENV"
          echo "GIT_SHA=$GIT_SHA"     >> "$GITHUB_ENV"
          echo "BUILD_TIME=$BUILD_TIME" >> "$GITHUB_ENV"
          echo "PREV_TAG=$PREV_TAG"   >> "$GITHUB_ENV"
          # Absolute path for the `changelog` additional build context. Passing an
          # absolute path avoids the version-dependent Compose behaviour where a relative
          # additional_contexts path is resolved against ./app instead of the repo root.
          echo "CHANGELOG_CONTEXT=${{ github.workspace }}" >> "$GITHUB_ENV"

      # Build via docker compose so the CHANGELOG additional_contexts entry and the
      # GIT_SHA/BUILD_TIME build-args are wired exactly as they are in local builds
      # (matches scripts/build.sh and docker-compose.yml finance-app.build.args).
      - name: Build stamped Docker image
        working-directory: .
        run: |
          docker compose build finance-app

          # compose builds/tags the service's `image:` (finance-app:latest); re-tag it
          # with the release version and full SHA. (`docker compose images -q` lists images
          # for *containers*, which don't exist after a build-only step, so it returns "".)
          docker tag finance-app:latest "finance-app:$VER"
          docker tag finance-app:latest "finance-app:$GIT_SHA"

      # Boot the full stack (postgres → migrate → finance-app) and assert /api/health
      # reports the expected version + SHA. We poll /api/health directly (rather than the
      # container's own wget healthcheck) so the assertion doesn't depend on the runner's
      # wget flavour and so the response body + service logs are captured on failure.
      - name: Boot stack and verify /api/health
        working-directory: .
        # The postgres init script (init-db/01-create-databases.sh, run on first start
        # under `set -euo pipefail`) needs POSTGRES_DB and the Metabase role vars to be
        # non-empty, or `CREATE ROLE`/`--dbname ""` aborts and postgres never goes healthy.
        # Metabase itself is profile-gated (bi) so it never starts here; only the role is created.
        # Point the app at Finances_Test, the fully-seeded fixture DB. A fresh Finances
        # DB is intentionally seeded with only account_type_categories + transaction_types
        # (shared-lookups.sql); transaction_categories rows — including the "Other" row the
        # /api/health drift check requires — are user-created in Finances but fixture-seeded
        # in Finances_Test. So a brand-new Finances legitimately trips the drift 503; the
        # release smoke test verifies against the complete, drift-free test dataset instead.
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: postgres
          FINANCE_APP_DB: Finances_Test
          MB_DB_USER: metabase
          MB_DB_PASS: changeme
          MB_DB_DBNAME: metabase
          AUTH_SECRET: release-smoke-test-only-secret
        run: |
          docker compose up -d

          echo "Polling http://localhost:3001/api/health for a 200…"
          TIMEOUT=180
          ELAPSED=0
          # curl -fsS: non-zero exit on any non-2xx (e.g. the 503 the route returns on
          # DB-disconnect or seed drift), so the loop keeps waiting until a real 200.
          until HEALTH="$(curl -fsS http://localhost:3001/api/health 2>/dev/null)"; do
            if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
              echo "::error::/api/health did not return 200 within ${TIMEOUT}s"
              echo "--- last /api/health body (with status) ---"
              curl -s -w '\nHTTP %{http_code}\n' http://localhost:3001/api/health || true
              echo "--- migrate logs ---";     docker compose logs --no-color migrate     || true
              echo "--- finance-app logs ---";  docker compose logs --no-color finance-app || true
              exit 1
            fi
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done

          echo "Health response: $HEALTH"

          GOT_VER="$(echo "$HEALTH" | jq -r '.build.version')"
          GOT_SHA="$(echo "$HEALTH" | jq -r '.build.gitSha')"

          if [ "$GOT_VER" != "$VER" ]; then
            echo "::error::/api/health reported version '$GOT_VER', expected '$VER'"
            exit 1
          fi
          if [ "$GOT_SHA" != "$GIT_SHA" ]; then
            echo "::error::/api/health reported gitSha '$GOT_SHA', expected '$GIT_SHA'"
            exit 1
          fi

          echo "✓ /api/health: version=$GOT_VER  gitSha=${GOT_SHA:0:12}…"

      - name: Tear down stack
        working-directory: .
        if: always()
        run: docker compose down -v

      # Slice the release body straight out of CHANGELOG.md (docs/releases.md step 4).
      # Captures everything between "## [X.Y.Z]" and the next "## [" header, then
      # appends a Full Changelog compare link when a previous tag exists.
      - name: Slice release body from CHANGELOG
        working-directory: .
        run: |
          awk -v v="$VER" '
            $0 ~ "^## \\[" v "\\] " { flag=1; next }
            /^## \[/                 { flag=0 }
            flag
          ' CHANGELOG.md | sed 's/[[:space:]]*$//' > notes.md

          if [ -n "$PREV_TAG" ]; then
            echo "" >> notes.md
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${GITHUB_REF_NAME}" >> notes.md
          fi

          echo "--- release body ---"
          cat notes.md

      - name: Publish GitHub Release
        working-directory: .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file notes.md \
            --verify-tag
