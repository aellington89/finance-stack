name: CI

on:
  push:
    branches: [master, test]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create test database
        env:
          PGPASSWORD: changeme
        run: psql -h localhost -U postgres -c 'CREATE DATABASE "Finances_Test";'

      - name: Apply Drizzle migrations
        env:
          DATABASE_URL: postgresql://postgres:changeme@localhost:5432/Finances_Test
        run: npm run db:migrate

      - name: Seed test database
        env:
          PGPASSWORD: changeme
        run: |
          psql -h localhost -U postgres -d "Finances_Test" -f ../init-db/seeds/shared-lookups.sql
          psql -h localhost -U postgres -d "Finances_Test" -f ../init-db/seeds/finances-test-mock-data.sql
          psql -h localhost -U postgres -d "Finances_Test" -f ../init-db/seeds/rebuild-balance-history.sql

      - name: Schema drift gate
        env:
          DATABASE_URL: postgresql://postgres:changeme@localhost:5432/Finances_Test
        run: |
          # Run drizzle-kit generate. If schema.ts diverges from the latest
          # meta snapshot, a new migration SQL file appears under drizzle/migrations/.
          # Anything new in the working tree there = schema.ts was edited
          # without a matching migration being committed.
          npx drizzle-kit generate --name drift_check
          if [ -n "$(git status --porcelain drizzle/migrations/)" ]; then
            echo ""
            echo "::error::Schema drift detected: drizzle/schema.ts diverges from the latest migration snapshot."
            echo "Run 'npm run db:generate -- --name <description>' locally and commit the generated migration."
            git status drizzle/migrations/
            exit 1
          fi

      - name: Seed reference gate
        run: npm run check:seed-references

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        env:
          DATABASE_URL: postgresql://postgres:changeme@localhost:5432/Finances_Test
        run: npm run test:integration
